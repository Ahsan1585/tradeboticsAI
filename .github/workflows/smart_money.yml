# .github/workflows/smart_money.yml
name: Smart Money Ingest

on:
  schedule:
    - cron: '0 3 * * 1'  # weekly, Monday ~10pm ET Sunday/11pm -- 13F/Form4 don't need nightly cadence
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m jobs.ingest_smart_money
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
